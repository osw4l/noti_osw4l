services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: noti_osw4l_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ecto://postgres:postgres@db/noti_osw4l_dev
      SECRET_KEY_BASE: "m3Ks9xP2vR7nQ8wL1jF6hT0yB4dG5cA2eI8uO3pN7sV1xZ6kJ4qW9rM0bH5fD2gY"
      PHX_HOST: localhost
      PORT: "4000"
      PHX_SERVER: "true"
    command: >
      sh -c "/app/bin/noti_osw4l eval 'NotiOsw4l.Release.migrate()' && /app/bin/noti_osw4l start"

  dbgate:
    image: dbgate/dbgate:latest
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      CONNECTIONS: >
        [
          {
            "server": "db",
            "port": 5432,
            "user": "postgres",
            "password": "postgres",
            "database": "noti_osw4l_dev",
            "engine": "postgres@dbgate-plugin-postgres",
            "label": "noti_osw4l_dev"
          }
        ]
    volumes:
      - dbgate_data:/root/.dbgate

volumes:
  pgdata:
  dbgate_data:
