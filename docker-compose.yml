services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: noti_osw4l_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  dbgate:
    image: dbgate/dbgate:latest
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      CONNECTIONS: >
        [
          {
            "server": "db",
            "port": 5432,
            "user": "postgres",
            "password": "postgres",
            "database": "noti_osw4l_dev",
            "engine": "postgres@dbgate-plugin-postgres",
            "label": "noti_osw4l_dev"
          }
        ]
    volumes:
      - dbgate_data:/root/.dbgate

volumes:
  pgdata:
  dbgate_data:
